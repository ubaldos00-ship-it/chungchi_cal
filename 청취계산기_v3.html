<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>청취 10a당 생산량 계산기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ── 전체 폰트: Noto Sans KR (고딕) ── */
:root {
  --bg:#f0f7f0; --surface:#e4f0e4; --card:#ffffff; --border:#b8d9b8; --border2:#d4ebd4;
  --accent:#2e7d32; --accent2:#388e3c;
  --accentlt:#e8f5e9; --accentmd:#c8e6c9;
  --danger:#c62828; --dangerlt:#ffebee;
  --blue:#1565c0; --bluelt:#e3f2fd;
  --warn:#e65100;
  --text:#1a2e1a; --text2:#3a5a3a; --muted:#6a8f6a;
  --white:#ffffff;
  --f:'Noto Sans KR',sans-serif;
  --r:12px; --sh:0 2px 12px rgba(46,125,50,0.10); --sh2:0 4px 20px rgba(46,125,50,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;}
body{padding-top:62px;padding-bottom:48px;}

/* ── 고정 헤더 ── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:linear-gradient(135deg,#2e7d32,#388e3c);
  padding:0 16px;height:62px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 12px rgba(46,125,50,0.35);
}
.header-icon{
  width:38px;height:38px;background:rgba(255,255,255,0.2);border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,0.35);
}
.header-title{font-size:16px;font-weight:900;color:#fff;line-height:1.2;}
.header-sub{font-size:10px;color:rgba(255,255,255,0.75);margin-top:1px;}

/* ── 섹션 라벨 (동그라미 없이, 크고 선명하게) ── */
.section{padding:14px 14px 0;}
.sec-label{
  font-size:15px;font-weight:900;color:var(--accent);
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
  letter-spacing:-0.2px;
}
.sec-label::after{content:'';flex:1;height:2px;background:var(--accentmd);}
.sec-num-txt{
  font-size:15px;font-weight:900;color:var(--white);
  background:var(--accent);border-radius:6px;
  padding:2px 8px;line-height:1.4;
}

/* ── ① 공통사항 ── */
.common-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh);}
.common-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.common-field label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin-bottom:4px;}
.common-input{
  width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:14px;font-weight:500;padding:10px 10px;
  font-family:var(--f);outline:none;-webkit-appearance:none;
}
.common-input:focus{border-color:var(--accent);background:var(--accentlt);}
.reset-btn{
  width:100%;margin-top:10px;background:var(--surface);border:1.5px solid var(--border);
  border-radius:8px;padding:10px;color:var(--muted);font-family:var(--f);
  font-size:13px;font-weight:700;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;gap:6px;
  -webkit-tap-highlight-color:transparent;
}
.reset-btn:active{background:var(--dangerlt);border-color:var(--danger);color:var(--danger);}

/* ── ② 지역 ── */
.region-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.region-btn{
  background:var(--card);border:2px solid var(--border);border-radius:10px;
  padding:11px 6px;cursor:pointer;color:var(--text2);font-family:var(--f);
  font-size:14px;font-weight:700;text-align:center;transition:all 0.15s;
  -webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:var(--sh);
}
.region-btn .rbadge{font-size:9px;font-weight:700;color:var(--muted);}
.region-btn.active{border-color:var(--accent);background:var(--accentlt);color:var(--accent);box-shadow:0 0 0 1.5px var(--accent);}
.region-btn.active .rbadge{color:var(--accent2);}
.region-btn:active{transform:scale(0.97);}

/* ── ③ 작물 ── */
.crop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.crop-btn{
  background:var(--card);border:2px solid var(--border);border-radius:var(--r);
  padding:11px 6px;cursor:pointer;transition:all 0.18s;text-align:center;
  color:var(--text2);font-family:var(--f);-webkit-tap-highlight-color:transparent;
  display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:var(--sh);
}
.crop-btn:active{transform:scale(0.97);}
.crop-btn.active{border-color:var(--accent);background:var(--accentlt);box-shadow:0 0 0 1.5px var(--accent),var(--sh2);}
.crop-btn .ce{font-size:22px;}
.crop-btn .cn{font-size:12px;font-weight:700;color:var(--text);line-height:1.2;}
.crop-btn .cu{font-size:10px;color:var(--muted);background:var(--surface);padding:2px 5px;border-radius:20px;}

/* ── ④ 면적·수량 ── */
.calc-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--sh);}

/* 면적 행 */
.area-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:14px;}
.area-field{display:flex;flex-direction:column;gap:4px;}
.area-field label{font-size:12px;font-weight:700;color:var(--muted);}
.area-iw{display:flex;gap:5px;align-items:center;}
.area-inp{
  flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  color:var(--text);font-size:18px;font-weight:700;font-family:var(--f);
  padding:10px 5px;outline:none;width:100%;-webkit-appearance:none;text-align:center;
}
.area-inp:focus{border-color:var(--accent);background:var(--accentlt);}
.utag{font-size:12px;font-weight:700;color:var(--accent2);background:var(--accentmd);border-radius:6px;padding:6px 8px;white-space:nowrap;}
.area-arrow{display:flex;flex-direction:column;align-items:center;color:var(--muted);font-size:18px;padding-top:18px;}

/* 단위무게 행 */
.unit-row{
  display:flex;align-items:center;gap:8px;padding:9px 12px;
  background:var(--accentlt);border:1.5px solid var(--accentmd);border-radius:8px;
  margin-bottom:12px;
}
.unit-name-badge{
  font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;
  background:var(--accent);color:#fff;
}
.unit-sep{color:var(--muted);font-size:12px;}
.unitkg-inp{
  width:64px;background:#fff;border:1.5px solid var(--border);border-radius:6px;
  color:var(--text);font-size:14px;font-weight:700;font-family:var(--f);
  padding:5px 6px;text-align:center;outline:none;-webkit-appearance:none;
}
.unitkg-inp:focus{border-color:var(--accent);}
.unit-lbl{font-size:12px;color:var(--muted);font-weight:500;}

/* 수확수량 섹션 */
.qty-section-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;
}
.qty-section-title{font-size:13px;font-weight:700;color:var(--text2);}
.add-row-btn{
  background:var(--accent);color:#fff;border:none;border-radius:8px;
  padding:8px 14px;font-size:13px;font-weight:700;font-family:var(--f);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:4px;
  box-shadow:0 2px 8px rgba(46,125,50,0.3);
  transition:all 0.15s;
}
.add-row-btn:active{transform:scale(0.97);opacity:0.9;}

/* 수확수량 row: 수량 | 단위(편집) | → | kg 결과 | 삭제 */
.qty-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.qty-row-item{
  display:grid;
  grid-template-columns:80px 70px 16px 1fr 28px;
  gap:5px;align-items:center;
  background:var(--surface);border:1px solid var(--border2);border-radius:8px;
  padding:7px 8px;
}
.qty-inp{
  background:#fff;border:1.5px solid var(--border);border-radius:6px;
  color:var(--text);font-size:16px;font-weight:700;font-family:var(--f);
  padding:6px 4px;outline:none;width:100%;-webkit-appearance:none;text-align:center;
}
.qty-inp:focus{border-color:var(--accent);background:var(--accentlt);}
.qty-unit-inp{
  background:#fff;border:1.5px solid var(--accentmd);border-radius:6px;
  color:var(--accent);font-size:11px;font-weight:700;font-family:var(--f);
  padding:6px 4px;outline:none;width:100%;text-align:center;
}
.qty-unit-inp:focus{border-color:var(--accent);}
.qty-arrow{color:var(--muted);font-size:13px;text-align:center;}
.qty-calc{font-size:13px;font-weight:700;color:var(--accent);text-align:right;white-space:nowrap;}
.qty-del{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;text-align:center;}

/* 합계 */
.qty-total{
  background:var(--accentlt);border:1.5px solid var(--accent);border-radius:8px;
  padding:10px 12px;
}
.qt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.qt-row:last-child{margin-bottom:0;}
.qt-lbl{font-size:12px;color:var(--muted);font-weight:700;}
.qt-val{font-size:14px;font-weight:700;color:var(--accent);}
.qt-val.big{font-size:18px;color:var(--accent2);}

/* ── ⑤ 5년 표 ── */
.table-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.table-header{
  padding:12px 14px;font-size:13px;font-weight:700;color:var(--text2);
  border-bottom:1px solid var(--border2);background:var(--surface);
  display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;
}
.table-header .ti{margin-left:auto;font-size:14px;transition:transform 0.2s;color:var(--muted);}
.table-header.open .ti{transform:rotate(180deg);}
.table-wrap{overflow-x:auto;display:none;}
.table-wrap.vis{display:block;}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--f);}
.th-main{background:var(--accentmd);color:var(--accent);font-size:11px;font-weight:800;padding:7px 8px;text-align:center;border-right:1px solid var(--border);}
.th-avg{background:#fff8e1;color:#e65100;font-size:11px;font-weight:800;padding:7px 8px;text-align:center;}
tbody td{padding:8px;border-bottom:1px solid var(--border2);text-align:center;color:var(--text);border-right:1px solid var(--border2);}
tbody td:first-child{text-align:left;font-size:12px;font-weight:700;border-right:2px solid var(--border);}
tbody td:last-child{border-right:none;color:var(--warn);font-weight:700;}
tbody tr:last-child td{border-bottom:none;}
.star-row td{color:var(--accent);background:var(--accentlt);}

/* ── 결과 영역 ── */
#result-capture{background:var(--bg);padding:0;}
.survey-summary{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--r);padding:12px 14px;margin:0 14px 10px;
}
.ss-title{font-size:12px;font-weight:800;letter-spacing:0.5px;color:var(--accent);margin-bottom:8px;}
.ss-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px 12px;}
.ss-item{display:flex;gap:6px;align-items:baseline;}
.ss-full{grid-column:1/-1;}
.ss-lbl{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;}
.ss-val{font-size:13px;font-weight:700;color:var(--text);}

.result-card{
  background:linear-gradient(135deg,#e8f5e9,#f5fbf5);
  border:2px solid var(--accent);border-radius:var(--r);
  padding:16px;box-shadow:var(--sh2);margin:0 14px 10px;
}
.result-main{text-align:center;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--accentmd);}
.result-lbl{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:4px;}
.result-val{font-size:52px;font-weight:900;color:var(--accent);line-height:1;letter-spacing:-2px;font-family:var(--f);}
.result-val .unit{font-size:18px;color:var(--muted);font-weight:500;margin-left:4px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-top:8px;}
.badge.up{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
.badge.down{background:var(--dangerlt);color:var(--danger);border:1px solid #ffcdd2;}
.badge.flat{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.formula-box{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;color:var(--text2);line-height:1.8;}
.f-title{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:5px;}
.formula-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.fk{color:var(--accent2);font-weight:700;}
.result-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.result-col{display:flex;flex-direction:column;gap:8px;}
.rc-label{font-size:10px;font-weight:800;color:var(--muted);margin-bottom:2px;padding-left:2px;}
.result-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 12px;box-shadow:var(--sh);}
.ri-label{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;}
.ri-val{font-size:17px;font-weight:700;color:var(--text);}
.ri-unit{font-size:11px;color:var(--muted);margin-left:2px;}

/* ── 비교 섹션 ── */
.compare-sec{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin:0 14px 10px;box-shadow:var(--sh);}
.cmp-title{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:12px;}

.cmp-row{margin-bottom:14px;}
.cmp-row:last-of-type{margin-bottom:0;}
.cmp-row-label{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;
}
.cmp-row-label span:first-child{font-size:12px;font-weight:700;color:var(--text2);}
.cmp-badge{
  font-size:12px;font-weight:700;padding:3px 9px;border-radius:6px;
}
.cmp-badge.up{background:var(--bluelt);color:var(--blue);}
.cmp-badge.down{background:var(--dangerlt);color:var(--danger);}

/* 중앙 기준선 비교 바 */
.div-bar-wrap{
  position:relative;height:20px;background:#f3f3f3;border-radius:6px;
  overflow:hidden;
}
.div-bar-center{
  position:absolute;left:50%;top:0;bottom:0;
  width:2px;background:var(--text2);transform:translateX(-50%);
  z-index:2;
}
.div-bar-fill{
  position:absolute;top:0;bottom:0;
  border-radius:4px;transition:all 0.4s;
  z-index:1;
}
.div-bar-fill.up{background:var(--blue);left:50%;}
.div-bar-fill.down{background:var(--danger);right:50%;}
.div-bar-axis{
  display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px;
}

/* ── 지역별 수평 바 차트 ── */
.chart-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:14px;margin:0 14px 14px;box-shadow:var(--sh);}
.chart-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text2);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:11px;}
.cl-item{display:flex;align-items:center;gap:4px;color:var(--muted);}
.cl-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.hbar-group{margin-bottom:14px;}
.hbar-region{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.hbar-row{display:grid;grid-template-columns:36px 1fr 72px;gap:4px;align-items:center;margin-bottom:5px;}
.hbar-lbl{font-size:10px;font-weight:700;color:var(--muted);text-align:right;}
.hbar-track{background:#ebebeb;border-radius:4px;height:14px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:4px;transition:width 0.4s;}
.hbar-fill.avg5{background:#2e7d32;}
.hbar-fill.prev{background:#66bb6a;}
.hbar-fill.survey{background:#1565c0;}
.hbar-val{font-size:11px;font-weight:700;color:var(--text2);text-align:right;white-space:nowrap;}
.hbar-val.survey{color:var(--blue);}
.hbar-val.dash{color:var(--muted);}
.hbar-divider{height:1px;background:var(--border2);margin:10px 0;}

/* ── Capture ── */
.capture-section{padding:12px 14px 40px;}
.fab-btn{
  width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--r);
  padding:17px;font-size:16px;font-weight:900;font-family:var(--f);
  display:flex;align-items:center;justify-content:center;gap:10px;
  cursor:pointer;box-shadow:0 4px 16px rgba(46,125,50,0.35);
  transition:all 0.18s;-webkit-tap-highlight-color:transparent;
}
.fab-btn:active{transform:scale(0.98);opacity:0.9;}
.fab-btn:disabled{opacity:0.5;}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 16px 40px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:500px;overflow:hidden;}
.modal-header{padding:14px 16px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;}
.modal-close{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;}
.modal-img-wrap{padding:12px;text-align:center;}
.modal-img-wrap img{width:100%;border-radius:8px;border:1px solid var(--border);}
.modal-hint{padding:6px 16px 14px;font-size:13px;color:var(--muted);text-align:center;}
.modal-dl-btn{display:block;width:calc(100% - 32px);margin:0 16px 16px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:var(--f);text-align:center;text-decoration:none;}

/* ── Toast ── */
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:700;opacity:0;transition:all 0.3s;z-index:99999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-result{text-align:center;padding:24px 20px;color:var(--muted);font-size:14px;}
.empty-result .ei{font-size:32px;margin-bottom:8px;}
</style>
</head>
<body>

<!-- Modal -->
<div class="modal-overlay" id="capture-modal">
  <div class="modal-box">
    <div class="modal-header"><span>📸 조사 결과 이미지</span><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="modal-img-wrap"><img id="modal-img" src="" alt=""></div>
    <div class="modal-hint" id="modal-hint"></div>
    <a class="modal-dl-btn" id="modal-dl-btn" href="#" download="조사결과.png">💾 이미지 다운로드</a>
  </div>
</div>

<!-- ══ 고정 헤더 ══ -->
<div class="header">
  <div class="header-icon">🌾</div>
  <div>
    <div class="header-title">청취 10a당 생산량 계산기</div>
    <div class="header-sub">현장 생산량 환산 · 지역 비교 · 결과 저장</div>
  </div>
</div>

<!-- ══ 입력 폼 ══ -->
<div id="input-form-area">

<!-- ① 공통사항 -->
<div class="section" style="padding-top:16px;">
  <div class="sec-label">
    <span class="sec-num-txt">①</span> 공통사항
  </div>
  <div class="common-card">
    <div class="common-row">
      <div class="common-field">
        <label>조사 필지</label>
        <input class="common-input" type="text" id="input-address" placeholder="필지명 입력" oninput="updateSummary()">
      </div>
      <div class="common-field">
        <label>조사 일자</label>
        <input class="common-input" type="date" id="input-date" oninput="updateSummary()">
      </div>
    </div>
    <button class="reset-btn" onclick="resetAll()">🔄 초기화 (전체 입력값 리셋)</button>
  </div>
</div>

<!-- ② 지역 선택 -->
<div class="section">
  <div class="sec-label"><span class="sec-num-txt">②</span> 지역 선택</div>
  <div class="region-selector">
    <button class="region-btn" data-region="대구" onclick="selectRegion(this,'대구')">
      <span>🏙️ 대구</span><span class="rbadge">비교 기준</span>
    </button>
    <button class="region-btn active" data-region="경북" onclick="selectRegion(this,'경북')">
      <span>🌄 경북</span><span class="rbadge">선택됨</span>
    </button>
    <button class="region-btn" data-region="강원" onclick="selectRegion(this,'강원')">
      <span>🏔️ 강원</span><span class="rbadge">비교 기준</span>
    </button>
  </div>
</div>

<!-- ③ 작물 선택 -->
<div class="section">
  <div class="sec-label"><span class="sec-num-txt">③</span> 작물 선택</div>
  <div class="crop-grid" id="crop-grid"></div>
</div>

<!-- ④ 면적·수량 합계 -->
<div class="section" style="margin-top:4px;">
  <div class="sec-label"><span class="sec-num-txt">④</span> 면적 · 수량 합계</div>
  <div class="calc-card">

    <!-- 면적 입력 -->
    <div class="area-row">
      <div class="area-field">
        <label>📐 평</label>
        <div class="area-iw">
          <input class="area-inp" type="number" id="inp-pyeong" placeholder="0" inputmode="decimal" oninput="onPyeong()">
          <span class="utag">평</span>
        </div>
      </div>
      <div class="area-arrow">⇄</div>
      <div class="area-field">
        <label>m²</label>
        <div class="area-iw">
          <input class="area-inp" type="number" id="inp-m2" placeholder="0" inputmode="decimal" oninput="onM2()">
          <span class="utag">m²</span>
        </div>
      </div>
    </div>

    <!-- 단위 정보 -->
    <div class="unit-row">
      <span class="unit-name-badge" id="unit-name-badge">단위 미선택</span>
      <span class="unit-sep">·</span>
      <input class="unitkg-inp" type="number" id="inp-unitkg" value="" placeholder="kg" inputmode="decimal" oninput="recalcAll()">
      <span class="unit-lbl">kg / 단위</span>
      <span style="font-size:11px;color:var(--muted);margin-left:auto;">(수정 가능)</span>
    </div>

    <!-- 수확수량 행 -->
    <div class="qty-section-header">
      <span class="qty-section-title">📦 수확 수량</span>
      <button class="add-row-btn" onclick="addQtyRow()">＋ 행 추가</button>
    </div>

    <!-- 컬럼 헤더 -->
    <div style="display:grid;grid-template-columns:80px 70px 16px 1fr 28px;gap:5px;margin-bottom:4px;padding:0 8px;">
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-align:center;">수량</span>
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-align:center;">단위</span>
      <span></span>
      <span style="font-size:10px;font-weight:700;color:var(--muted);text-align:right;">수확량</span>
      <span></span>
    </div>

    <div class="qty-rows" id="qty-rows"></div>

    <!-- 합계 -->
    <div class="qty-total" id="qty-total">
      <div class="qt-row">
        <span class="qt-lbl">평   합계</span>
        <span class="qt-val" id="total-pyeong">—</span>
      </div>
      <div class="qt-row">
        <span class="qt-lbl">수확 합계</span>
        <span class="qt-val big" id="total-kg">—</span>
      </div>
    </div>
  </div>
</div>

<!-- ⑤ 5년 생산량 표 -->
<div class="section" style="margin-top:4px;padding-bottom:16px;">
  <div class="sec-label"><span class="sec-num-txt">⑤</span> <span id="table-sec-label">작물 지역별 5년 생산량 상세표</span></div>
  <div class="table-card">
    <div class="table-header" id="table-header" onclick="toggleTable()">
      <span>📋</span>
      <span id="table-header-text">작물별 지역 5년 생산량 상세표 (kg/10a)</span>
      <span class="ti">▼</span>
    </div>
    <div class="table-wrap" id="five-year-wrap">
      <div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">작물을 선택하면 표가 표시됩니다</div>
    </div>
  </div>
</div>

</div><!-- /input-form-area -->

<!-- ══ 결과 캡처 영역 ══ -->
<div id="result-capture" style="padding-top:4px;">

  <!-- 조사 정보 요약 -->
  <div class="survey-summary" id="survey-summary">
    <div class="ss-title">🌾 농작물 청취조사 결과</div>
    <div class="ss-grid">
      <div class="ss-item ss-full"><span class="ss-lbl">조사필지</span><span class="ss-val" id="sum-address">—</span></div>
      <div class="ss-item"><span class="ss-lbl">조사일</span><span class="ss-val" id="sum-date">—</span></div>
      <div class="ss-item"><span class="ss-lbl">작물</span><span class="ss-val" id="sum-crop">—</span></div>
    </div>
  </div>

  <!-- 계산 결과 -->
  <div id="result-area"></div>

  <!-- 비교 데이터 -->
  <div id="compare-area"></div>

  <!-- 그래프 -->
  <div id="chart-area">
    <div class="chart-card">
      <div class="empty-result"><div class="ei">📊</div><div>계산 결과가 나오면 그래프가 표시됩니다</div></div>
    </div>
  </div>

</div><!-- /result-capture -->

<!-- 캡처 버튼 -->
<div class="capture-section">
  <button class="fab-btn" id="capture-btn" onclick="captureResult()">
    <span>📸</span> 결과 이미지로 저장
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════
   데이터 (KOSIS 농작물생산조사 2021~2025)
══════════════════════════════════════ */
const YEARS = ['2021','2022','2023','2024','2025'];
const CROPS = [
  { id:'apple',  emoji:'🍎', name:'사과',    unit:'컨테이너', unitKg:18,
    d:{'대구':[1390,1841,1065,1328,1408],'경북':[1876,2108,1648,2024,2053],'강원':[2232,2085,1621,1852,1711]}},
  { id:'pear',   emoji:'🍐', name:'배',      unit:'컨테이너', unitKg:18,
    d:{'대구':[2203,2901,2156,970,1975], '경북':[2203,2901,2156,2303,1975],'강원':[1594,1613,806,1913,2382]}},
  { id:'pepper', emoji:'🌶️', name:'고추',   unit:'근',       unitKg:0.6,
    d:{'대구':[185,145,142,243,221],     '경북':[282,221,221,252,239],     '강원':[309,231,267,255,236]}},
  { id:'sesame', emoji:'🌿', name:'참깨',    unit:'되',       unitKg:1.2,
    d:{'대구':[54,48,43,56,62],          '경북':[49,51,43,47,62],          '강원':[67,53,54,56,71]}},
  { id:'potato', emoji:'🥔', name:'가을감자', unit:'박스',    unitKg:10,
    d:{'대구':[1352,1402,1215,1188,null],'경북':[1556,1084,1621,1704,null],'강원':[2183,2053,2030,2013,null]}},
  { id:'sweet',  emoji:'🍠', name:'고구마',  unit:'박스',     unitKg:10,
    d:{'대구':[586,762,1279,1350,null],  '경북':[1420,1470,1316,1461,null],'강원':[1543,1259,1569,1604,null]}},
  { id:'hulled', emoji:'🌾', name:'겉보리',  unit:'톤백',     unitKg:500,
    d:{'대구':[255,212,220,181,178],     '경북':[232,219,290,236,269],     '강원':[209,180,208,236,269]}},
  { id:'naked',  emoji:'🌾', name:'쌀보리',  unit:'톤백',     unitKg:500,
    d:{'대구':[null,106,204,128,206],    '경북':[225,106,204,128,206],     '강원':[225,268,204,128,206]}},
  { id:'wheat',  emoji:'🥖', name:'밀',      unit:'톤백',     unitKg:500,
    d:{'대구':[null,null,null,470,null], '경북':[313,318,339,334,368],     '강원':[253,250,264,272,285]}},
];

/* ── 통계 헬퍼 ── */
function calcAvg(arr) {
  const v = arr.filter(x=>x!==null&&x>0);
  return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length) : null;
}
function lastValid(arr) {
  for (let i=arr.length-1;i>=0;i--) if(arr[i]!==null&&arr[i]>0) return arr[i];
  return null;
}

/* ── 상태 ── */
let selectedCrop   = null;
let selectedRegion = '경북';
let qtyRows        = [];   // [{id, qty, unit, unitKg}]
let captureCount   = 0;

const PY2M2 = 3.3058;
function fmt(n){ return (!n||isNaN(n))?'—':Math.round(n).toLocaleString('ko-KR'); }
function fmtD(n,d=1){ return (!n||isNaN(n))?'—':n.toLocaleString('ko-KR',{maximumFractionDigits:d,minimumFractionDigits:0}); }

/* ── 초기화 ── */
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('input-date').value = new Date().toISOString().slice(0,10);
  renderCropGrid();
  qtyRows = [];
  addQtyRow();
  updateSummary();
});

/* ── 전체 리셋 ── */
function resetAll(){
  if(!confirm('모든 입력값을 초기화하시겠습니까?')) return;
  document.getElementById('input-address').value = '';
  document.getElementById('input-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('inp-pyeong').value = '';
  document.getElementById('inp-m2').value = '';
  document.getElementById('inp-unitkg').value = '';
  document.getElementById('unit-name-badge').textContent = '단위 미선택';
  document.querySelectorAll('.crop-btn').forEach(b=>b.classList.remove('active'));
  selectedCrop = null;
  qtyRows = [];
  addQtyRow();
  renderQtyRows();
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('compare-area').innerHTML = '';
  document.getElementById('chart-area').innerHTML =
    '<div class="chart-card"><div class="empty-result"><div class="ei">📊</div><div>계산 결과가 나오면 그래프가 표시됩니다</div></div></div>';
  document.getElementById('five-year-wrap').innerHTML =
    '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">작물을 선택하면 표가 표시됩니다</div>';
  document.getElementById('five-year-wrap').classList.remove('vis');
  document.getElementById('table-header').classList.remove('open');
  updateSummary();
  updateTotals();
  showToast('초기화 완료 ✓');
}

/* ── 지역 선택 ── */
function selectRegion(btn, region){
  selectedRegion = region;
  document.querySelectorAll('.region-btn').forEach(b=>{
    b.classList.remove('active');
    b.querySelector('.rbadge').textContent = '비교 기준';
  });
  btn.classList.add('active');
  btn.querySelector('.rbadge').textContent = '선택됨';
  if(selectedCrop){ renderFiveYearTable(); recalcAll(); }
}

/* ── 작물 그리드 ── */
function renderCropGrid(){
  const g = document.getElementById('crop-grid');
  g.innerHTML = '';
  CROPS.forEach(c=>{
    const b = document.createElement('button');
    b.className='crop-btn'; b.dataset.id=c.id;
    b.innerHTML=`<span class="ce">${c.emoji}</span><span class="cn">${c.name}</span><span class="cu">${c.unit}·${c.unitKg}kg</span>`;
    b.onclick=()=>selectCrop(c.id);
    g.appendChild(b);
  });
}

/* ── 작물 선택 ── */
function selectCrop(id){
  selectedCrop = CROPS.find(c=>c.id===id);
  document.querySelectorAll('.crop-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.crop-btn[data-id="${id}"]`).classList.add('active');
  document.getElementById('unit-name-badge').textContent = selectedCrop.unit;
  document.getElementById('inp-unitkg').value = selectedCrop.unitKg;
  // 기존 rows의 단위 동기화
  qtyRows.forEach(r=>{ r.unit=selectedCrop.unit; r.unitKg=selectedCrop.unitKg; });
  renderQtyRows();
  renderFiveYearTable();
  updateSummary();
  recalcAll();
}

/* ── 면적 환산 ── */
function onPyeong(){
  const v = parseFloat(document.getElementById('inp-pyeong').value)||0;
  document.getElementById('inp-m2').value = v ? (v*PY2M2).toFixed(1) : '';
  updateTotals(); updateSummary(); recalcAll();
}
function onM2(){
  const v = parseFloat(document.getElementById('inp-m2').value)||0;
  document.getElementById('inp-pyeong').value = v ? (v/PY2M2).toFixed(1) : '';
  updateTotals(); updateSummary(); recalcAll();
}

/* ── 수확수량 행 관리 ── */
function addQtyRow(){
  const unit    = selectedCrop ? selectedCrop.unit   : '단위';
  const unitKg  = selectedCrop ? selectedCrop.unitKg : 1;
  qtyRows.push({ id: Date.now()+Math.random(), qty:0, unit, unitKg });
  renderQtyRows();
}

function removeQtyRow(id){
  qtyRows = qtyRows.filter(r=>r.id!==id);
  if(qtyRows.length===0) addQtyRow();
  else { renderQtyRows(); recalcAll(); }
}

function updateRowQty(id, val){
  const r = qtyRows.find(r=>r.id==id);
  if(r){ r.qty = parseFloat(val)||0; updateRowCalc(id); updateTotals(); recalcAll(); }
}

function updateRowUnit(id, val){
  const r = qtyRows.find(r=>r.id==id);
  if(r){ r.unit = val; }
}

function updateRowUnitKg(id, val){
  const r = qtyRows.find(r=>r.id==id);
  if(r){ r.unitKg = parseFloat(val)||1; updateRowCalc(id); updateTotals(); recalcAll(); }
}

function updateRowCalc(id){
  const r = qtyRows.find(r=>r.id==id);
  if(!r) return;
  const el = document.getElementById(`qc-${id}`);
  if(el) el.textContent = r.qty>0 ? (r.qty*r.unitKg).toLocaleString('ko-KR',{maximumFractionDigits:1})+' kg' : '—';
}

function renderQtyRows(){
  const container = document.getElementById('qty-rows');
  const defUnit   = selectedCrop ? selectedCrop.unit : '단위';
  container.innerHTML = '';
  qtyRows.forEach(row=>{
    const calcKg = row.qty>0 ? (row.qty*row.unitKg).toLocaleString('ko-KR',{maximumFractionDigits:1})+' kg' : '—';
    const div = document.createElement('div');
    div.className='qty-row-item';
    div.innerHTML=`
      <input class="qty-inp" type="number" placeholder="0" inputmode="numeric"
        value="${row.qty||''}" oninput="updateRowQty('${row.id}',this.value)">
      <input class="qty-unit-inp" type="text" value="${row.unit||defUnit}"
        oninput="updateRowUnit('${row.id}',this.value)">
      <span class="qty-arrow">→</span>
      <span class="qty-calc" id="qc-${row.id}">${calcKg}</span>
      <button class="qty-del" onclick="removeQtyRow('${row.id}')" title="삭제">✕</button>`;
    container.appendChild(div);
  });
  updateTotals();
}

/* ── 합계 업데이트 ── */
function updateTotals(){
  const totalKg  = qtyRows.reduce((s,r)=>s+(r.qty*(r.unitKg||1)),0);
  const pyeong   = parseFloat(document.getElementById('inp-pyeong').value)||0;
  const m2val    = parseFloat(document.getElementById('inp-m2').value)||0;

  document.getElementById('total-pyeong').textContent =
    pyeong>0 ? `${fmtD(pyeong)}평 (${fmtD(m2val)} m²)` : '—';
  document.getElementById('total-kg').textContent =
    totalKg>0 ? `${totalKg.toLocaleString('ko-KR',{maximumFractionDigits:1})} kg` : '—';
}

/* ── 핵심 계산 ── */
function recalcAll(){
  if(!selectedCrop) return;
  const m2      = parseFloat(document.getElementById('inp-m2').value)||0;
  const totalKg = qtyRows.reduce((s,r)=>s+(r.qty*(r.unitKg||1)),0);
  const per10a  = m2>0 ? (totalKg/m2)*1000 : 0;
  renderResult(m2, totalKg, per10a);
  renderCompare(per10a);
  renderChart(per10a);
}

/* ── 결과 렌더 ── */
function renderResult(m2, totalKg, per10a){
  const rd  = selectedCrop.d[selectedRegion]||[];
  const avg = calcAvg(rd);
  let badge = '';
  if(avg&&per10a>0){
    const pct  = (per10a-avg)/avg*100;
    const sign = pct>=0?'+':'';
    const cls  = pct>5?'up':pct<-5?'down':'flat';
    const icon = pct>5?'▲':pct<-5?'▼':'─';
    badge = `<span class="badge ${cls}">${icon} ${sign}${Math.round(pct)}% (${selectedRegion} 평년 대비)</span>`;
  }
  const fml = (m2>0&&totalKg>0) ? `
    <div class="formula-box">
      <div class="f-title">📐 계산식</div>
      <div class="formula-row">
        <span class="fk">10a당 수량</span><span style="color:var(--muted)"> = </span>
        <span>(${fmt(totalKg)} kg ÷ ${fmtD(m2)} m²)</span>
        <span style="color:var(--muted)"> × </span><span>1,000</span>
        <span style="color:var(--muted)"> = </span>
        <span class="fk">${fmt(per10a)} kg/10a</span>
      </div>
    </div>` : '';

  const totalQty = qtyRows.reduce((s,r)=>s+(r.qty||0),0);
  const unitKg   = parseFloat(document.getElementById('inp-unitkg').value)||(selectedCrop?selectedCrop.unitKg:1);
  const unitName = selectedCrop.unit;

  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-main">
        <div class="result-lbl">10a당 수량</div>
        <div class="result-val">${fmt(per10a)}<span class="unit">kg</span></div>
        ${badge}${fml}
      </div>
      <div class="result-cols">
        <div class="result-col">
          <div class="rc-label">📐 경작 정보</div>
          <div class="result-item"><div class="ri-label">경작 면적</div><div class="ri-val">${m2>0?fmtD(m2):'—'}<span class="ri-unit">m²</span></div></div>
          <div class="result-item"><div class="ri-label">단위 무게</div><div class="ri-val">${unitKg}<span class="ri-unit">kg/${unitName}</span></div></div>
        </div>
        <div class="result-col">
          <div class="rc-label">📦 생산 정보</div>
          <div class="result-item"><div class="ri-label">전체 생산량</div><div class="ri-val">${fmt(totalKg)}<span class="ri-unit">kg</span></div></div>
          <div class="result-item"><div class="ri-label">수확 수량</div><div class="ri-val">${totalQty>0?totalQty:'—'}<span class="ri-unit">${unitName}</span></div></div>
        </div>
      </div>
    </div>`;
}

/* ── 비교 섹션 (중앙기준 발산형 바) ── */
function renderCompare(per10a){
  const rd   = selectedCrop.d[selectedRegion]||[];
  const avg  = calcAvg(rd);
  const prev = lastValid(rd);
  if((!avg&&!prev)||per10a<=0){ document.getElementById('compare-area').innerHTML=''; return; }

  function divBar(base, baseLabel, resultVal){
    if(!base||resultVal<=0) return '';
    const diff    = resultVal - base;
    const pct     = diff/base*100;
    const sign    = diff>=0?'+':'';
    const cls     = diff>=0?'up':'down';
    const icon    = diff>=0?'▲':'▼';
    /* 절댓값 %를 바 폭으로 변환, 최대 47% (50%까지 반쪽을 채움) */
    const barW = Math.min(Math.abs(pct)/100*50, 47);
    return `<div class="cmp-row">
      <div class="cmp-row-label">
        <span>전년 대비 (${selectedRegion})<span style="color:var(--muted);font-size:10px;"> 기준 ${base.toLocaleString()} kg</span></span>
        <span class="cmp-badge ${cls}">${sign}${Math.round(pct)}% (${sign}${Math.round(diff).toLocaleString()} kg)</span>
      </div>
      <div class="div-bar-wrap">
        <div class="div-bar-center"></div>
        <div class="div-bar-fill ${cls}" style="width:${barW}%"></div>
      </div>
      <div class="div-bar-axis">
        <span style="color:var(--danger);">◀ 감소</span>
        <span>기준값 (${base.toLocaleString()} kg)</span>
        <span style="color:var(--blue);">증가 ▶</span>
      </div>
    </div>`;
  }

  function divBarAvg(base, baseLabel, resultVal){
    if(!base||resultVal<=0) return '';
    const diff  = resultVal - base;
    const pct   = diff/base*100;
    const sign  = diff>=0?'+':'';
    const cls   = diff>=0?'up':'down';
    const barW  = Math.min(Math.abs(pct)/100*50, 47);
    return `<div class="cmp-row">
      <div class="cmp-row-label">
        <span>평년 대비 (${selectedRegion} 5년)<span style="color:var(--muted);font-size:10px;"> 기준 ${base.toLocaleString()} kg</span></span>
        <span class="cmp-badge ${cls}">${sign}${Math.round(pct)}% (${sign}${Math.round(diff).toLocaleString()} kg)</span>
      </div>
      <div class="div-bar-wrap">
        <div class="div-bar-center"></div>
        <div class="div-bar-fill ${cls}" style="width:${barW}%"></div>
      </div>
      <div class="div-bar-axis">
        <span style="color:var(--danger);">◀ 감소</span>
        <span>기준값 (${base.toLocaleString()} kg)</span>
        <span style="color:var(--blue);">증가 ▶</span>
      </div>
    </div>`;
  }

  document.getElementById('compare-area').innerHTML = `
    <div class="compare-sec">
      <div class="cmp-title">📊 국가데이터포털 데이터 비교</div>
      ${divBar(prev, '전년', per10a)}
      ${divBarAvg(avg, '평년', per10a)}
      <div style="font-size:10px;color:var(--muted);margin-top:8px;">※ 출처: KOSIS 농작물생산조사 (2021~2025). 전년: 최신년도 / 평년: 5개년 평균</div>
    </div>`;
}

/* ── 5년 생산량 표 ── */
function renderFiveYearTable(){
  if(!selectedCrop) return;
  document.getElementById('table-header-text').textContent =
    `${selectedCrop.emoji} ${selectedCrop.name} 지역별 5년 생산량 상세표 (kg/10a)`;
  document.getElementById('table-sec-label').textContent =
    `${selectedCrop.name} 지역별 5년 생산량 상세표`;

  const regions = ['대구','경북','강원'];
  let thead = `<thead><tr>
    <th class="th-main" style="text-align:left;min-width:50px;">지역</th>
    ${YEARS.map(y=>`<th class="th-main">${y}년</th>`).join('')}
    <th class="th-avg">평년</th>
  </tr></thead>`;
  let tbody = '<tbody>';
  regions.forEach(r=>{
    const arr  = selectedCrop.d[r]||[];
    const avg  = calcAvg(arr);
    const isStar = r===selectedRegion;
    tbody += `<tr${isStar?' class="star-row"':''}>
      <td>${r}${isStar?' ★':''}</td>
      ${arr.map(v=>`<td>${v!==null?v.toLocaleString():'—'}</td>`).join('')}
      <td>${avg?avg.toLocaleString():'—'}</td>
    </tr>`;
  });
  tbody += '</tbody>';
  const wrap = document.getElementById('five-year-wrap');
  wrap.innerHTML = `<table>${thead}${tbody}</table>
    <div style="font-size:10px;color:var(--muted);padding:6px 10px;">※ 출처: KOSIS 농작물생산조사</div>`;
  const hdr = document.getElementById('table-header');
  if(!hdr.classList.contains('open')){ hdr.classList.add('open'); wrap.classList.add('vis'); }
}

function toggleTable(){
  const hdr  = document.getElementById('table-header');
  const wrap = document.getElementById('five-year-wrap');
  hdr.classList.toggle('open');
  wrap.classList.toggle('vis');
}

/* ── 수평 바 차트 ── */
function renderChart(per10a){
  if(!selectedCrop) return;
  const regions = ['대구','경북','강원'];
  const allVals = regions.flatMap(r=>{
    const arr=selectedCrop.d[r]||[];
    return [calcAvg(arr)||0, lastValid(arr)||0];
  }).concat(per10a||0);
  const maxVal = Math.max(...allVals)*1.08 || 1000;
  const pct = v => v>0 ? Math.max(3, Math.round(v/maxVal*100)) : 0;
  const valStr = (v, cls='') =>
    v>0 ? `<span class="hbar-val ${cls}">${Math.round(v).toLocaleString()} kg</span>`
        : `<span class="hbar-val dash">—</span>`;

  let html = `
    <div class="chart-title">
      📊 ${selectedCrop.name} — 지역별 10a당 수량 비교
      <span style="color:var(--accent);font-size:11px;font-weight:700">[기준: ${selectedRegion}]</span>
    </div>
    <div class="chart-legend">
      <div class="cl-item"><div class="cl-dot" style="background:#2e7d32"></div>5년 평년</div>
      <div class="cl-item"><div class="cl-dot" style="background:#66bb6a"></div>전년</div>
      <div class="cl-item"><div class="cl-dot" style="background:#1565c0"></div>조사결과</div>
    </div>`;

  regions.forEach((r, ri)=>{
    const arr  = selectedCrop.d[r]||[];
    const avg5 = calcAvg(arr);
    const prev = lastValid(arr);
    const isStar = r===selectedRegion;
    const survVal = isStar ? per10a : null;

    html += `<div class="hbar-group">
      <div class="hbar-region">
        ${r==='대구'?'🏙️':r==='경북'?'🌄':'🏔️'} ${r}${isStar?' ★':''}
        ${isStar?`<span style="font-size:10px;color:var(--accent);font-weight:500;margin-left:4px;">선택 지역</span>`:''}
      </div>
      <div class="hbar-row">
        <span class="hbar-lbl">평년</span>
        <div class="hbar-track"><div class="hbar-fill avg5" style="width:${pct(avg5)}%"></div></div>
        ${valStr(avg5)}
      </div>
      <div class="hbar-row">
        <span class="hbar-lbl">전년</span>
        <div class="hbar-track"><div class="hbar-fill prev" style="width:${pct(prev)}%"></div></div>
        ${valStr(prev)}
      </div>
      <div class="hbar-row">
        <span class="hbar-lbl" style="color:var(--blue);font-weight:800;">조사</span>
        <div class="hbar-track"><div class="hbar-fill survey" style="width:${isStar?pct(per10a):0}%"></div></div>
        ${isStar&&per10a>0?valStr(per10a,'survey'):`<span class="hbar-val dash">—</span>`}
      </div>
    </div>
    ${ri<regions.length-1?'<div class="hbar-divider"></div>':''}`;
  });

  html += `<div style="font-size:10px;color:var(--muted);margin-top:4px;">※ 출처: KOSIS 농작물생산조사 (2021~2025)</div>`;
  document.getElementById('chart-area').innerHTML = `<div class="chart-card">${html}</div>`;
}

/* ── 요약 업데이트 ── */
function updateSummary(){
  document.getElementById('sum-address').textContent = document.getElementById('input-address').value||'—';
  const dv = document.getElementById('input-date').value;
  document.getElementById('sum-date').textContent = dv ? dv.replace(/-/g,'.') : '—';
  document.getElementById('sum-crop').textContent = selectedCrop ? `${selectedCrop.emoji} ${selectedCrop.name}` : '—';
}

/* ── 캡처 ── */
function isIOS(){ return /iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream; }
async function captureResult(){
  const btn=document.getElementById('capture-btn');
  btn.disabled=true; btn.innerHTML='<span>⏳</span> 이미지 생성 중...';
  try{
    await new Promise(r=>setTimeout(r,200));
    updateSummary();
    const el=document.getElementById('result-capture');
    const canvas=await html2canvas(el,{
      backgroundColor:'#f0f7f0',scale:Math.min(window.devicePixelRatio||1,2),
      useCORS:true,allowTaint:true,logging:false,
      x:0,y:0,scrollX:0,scrollY:0,
      width:el.scrollWidth,height:el.scrollHeight,
      windowWidth:el.scrollWidth,windowHeight:el.scrollHeight,
    });
    const dataUrl=canvas.toDataURL('image/png',1.0);
    const date=(document.getElementById('input-date').value||'').replace(/-/g,'');
    const crop=selectedCrop?selectedCrop.name:'survey';
    captureCount++;
    const fname=`청취조사_${crop}_${date||'result'}_${String(captureCount).padStart(3,'0')}.png`;
    document.getElementById('modal-img').src=dataUrl;
    const dl=document.getElementById('modal-dl-btn');
    dl.href=dataUrl; dl.download=fname;
    if(isIOS()){
      document.getElementById('modal-hint').textContent='📱 iOS: 이미지를 길게 눌러 "사진 앱에 저장"을 선택하세요.';
    } else {
      document.getElementById('modal-hint').textContent='✅ 다운로드가 시작됩니다. 아래 버튼으로 다시 받을 수 있습니다.';
      const a=document.createElement('a'); a.href=dataUrl; a.download=fname;
      document.body.appendChild(a); a.click(); setTimeout(()=>document.body.removeChild(a),500);
    }
    document.getElementById('capture-modal').classList.add('show');
  }catch(e){ showToast('⚠️ 캡처 오류: '+(e.message||String(e))); }
  btn.disabled=false; btn.innerHTML='<span>📸</span> 결과 이미지로 저장';
}
function closeModal(){ document.getElementById('capture-modal').classList.remove('show'); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
</script>
